version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: kidney_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - .:/app/db  # Optional: to persist predictions.db if it writes to cwd
    environment:
      - PORT=8000
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: kidney_app
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api/v1
    depends_on:
      - api
    restart: unless-stopped
